name: Chariot CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hub/package-lock.json
      - name: Install Hub Dependencies
        run: cd hub && npm install
      - name: Hub Build Check
        run: cd hub && npm run build
      - name: Hub Tests
        run: cd hub && npm test

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json
      - name: Install Agent Dependencies
        run: cd agent && npm install
      - name: Agent Tests
        run: cd agent && npm test

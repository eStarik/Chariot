{{- if and .Values.networkPolicy .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chariot-hub.fullname" . }}
  labels:
    {{- include "chariot-hub.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chariot-hub.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx # Common default, configurable
      ports:
        - protocol: TCP
          port: 3000
    # Allow traffic from Agents in other namespaces (if identifiable)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: chariot-agent
      ports:
        - protocol: TCP
          port: 3000
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chariot-hub.fullname" . }}
  labels:
    {{- include "chariot-hub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "chariot-hub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chariot-hub.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: hub
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: SHARED_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.existingSecret | default (include "chariot-hub.fullname" . ) }}
              key: sharedSecret
        - name: NEXT_PUBLIC_APP_VERSION
          value: "{{ .Values.image.tag | default .Chart.AppVersion }}"
        - name: DATABASE_URL
          {{- if .Values.postgresql.enabled }}
          value: "postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "chariot-hub.fullname" . }}-postgres:5432/{{ .Values.postgresql.auth.database }}"
          {{- else }}
          value: {{ .Values.env.databaseUrl | quote }}
          {{- end }}
        - name: NODE_ENV
          value: "production"
        {{- if .Values.auth.enabled }}
        - name: AUTH_TRUST_HOST
          value: "true"
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "chariot-hub.fullname" . }}
              key: authSecret
        {{- $globalDomain := .Values.global.domain -}}
        {{- if or $globalDomain .Values.auth.url (and .Values.ingress.enabled .Values.ingress.hosts (not (empty .Values.ingress.hosts))) }}
        - name: AUTH_URL
          {{- $url := .Values.auth.url -}}
          {{- if not $url }}
            {{- $host := "" -}}
            {{- if and .Values.ingress.enabled .Values.ingress.hosts (not (empty .Values.ingress.hosts)) }}
              {{- $host = (index .Values.ingress.hosts 0).host -}}
            {{- else }}
              {{- $host = printf "chariot.%s" $globalDomain -}}
            {{- end }}
            {{- $url = printf "https://%s" $host -}}
          {{- end }}
          value: {{ $url | quote }}
        {{- end }}
        {{- if .Values.auth.oidc.enabled }}
        - name: AUTH_KEYCLOAK_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "chariot-hub.fullname" . }}
              key: oidcClientId
        - name: AUTH_KEYCLOAK_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "chariot-hub.fullname" . }}
              key: oidcClientSecret
        - name: AUTH_KEYCLOAK_ISSUER
          value: {{ .Values.auth.oidc.issuer | quote }}
        {{- if .Values.auth.oidc.serverUrl }}
        - name: AUTH_KEYCLOAK_SERVER_URL
          value: {{ .Values.auth.oidc.serverUrl | quote }}
        {{- end }}
        - name: AUTH_ADMIN_GROUPS
          valueFrom:
            secretKeyRef:
              name: {{ include "chariot-hub.fullname" . }}
              key: adminGroups
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}

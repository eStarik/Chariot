# --- Local Test Overrides for Chariot Hub ---
# Usage: helm install chariot-hub ./charts/chariot-hub -f ./charts/chariot-hub/values.yaml -f ./charts/chariot-hub/values.local.yaml

image:
  pullPolicy: Always
  tag: "latest"

service:
  type: LoadBalancer # Easier access in local Docker Desktop / KinD environments

env:
  sharedSecret: "chariot-test-secret"

auth:
  url: "http://localhost:3000"
  oidc:
    enabled: true
    issuer: "http://localhost:8080/realms/chariot"
    serverUrl: "http://keycloak.keycloak:8080"
    clientId: "chariot-hub"
    clientSecret: "chariot-secret-1234"

postgresql:
  persistence:
    enabled: false # Avoid PV wait times in ephemeral local clusters
  primary:
    extendedConfiguration: |
      max_connections = 100

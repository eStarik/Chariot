replicaCount: 1

image:
  repository: ghcr.io/fabian/chariot-hub
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

env:
  sharedSecret: "chariot-test-secret" # Mandatory for agent registration handshake
  # existingSecret: "chariot-secrets"
  databaseUrl: "" # Manual override if postgresql.enabled is false

postgresql:
  enabled: true
  auth:
    database: chariot
    username: postgres
    password: mysecretpassword
  primary:
    persistence:
      enabled: true
      size: 8Gi

resources:
  limits:
    cpu: 200m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: chariot.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chariot-tls
  #    hosts:
  #      - chariot.example.com

serviceMonitor:
  enabled: false
  interval: 30s
  path: /api/metrics
  additionalLabels: {}

networkPolicy:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}

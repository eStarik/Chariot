{{- if .Values.rbac.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chariot-agent.fullname" . }}
  labels:
    {{- include "chariot-agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chariot-agent.fullname" . }}-monitor
rules:
- apiGroups: ["agones.dev"]
  resources: ["fleets", "gameservers"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chariot-agent.fullname" . }}-monitor-binding
subjects:
- kind: ServiceAccount
  name: {{ include "chariot-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "chariot-agent.fullname" . }}-monitor
  apiGroup: rbac.authorization.k8s.io
{{- end }}

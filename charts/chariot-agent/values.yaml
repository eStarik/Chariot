replicaCount: 1

image:
  repository: ghcr.io/estarik/chariot-agent
  pullPolicy: IfNotPresent
  tag: "latest"

hub:
  url: "http://chariot-hub.default.svc.cluster.local"
  sharedSecret: "chariot-test-secret"

cluster:
  name: "agones-cluster-01"
  namespaces: "default" # monitors these namespaces (comma-separated)
  # Optional: use a dedicated node selector for Agones clusters
  # nodeSelector: {}

reportIntervalMs: 30000 # telemetry heartbeat frequency in ms

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Enable RBAC for reading Agones fleets and node capacity
rbac:
  create: true
